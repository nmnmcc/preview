name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository == 'nmnmcc/preview' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Set up Devenv
        uses: ./.github/actions/setup-devenv
        with:
          cache-dependencies: "false"

      - name: Run checks in Devenv
        run: devenv shell -- yarn check

      - name: Create a release pull request or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: devenv shell -- yarn version-packages
          publish: devenv shell -- yarn release
          commit: "chore: release packages"
          title: "chore: release packages"
          commitMode: github-api
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
